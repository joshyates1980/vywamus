<!--===== CONTACT AREA STARTS =======-->
<section id="contact" class="vl-contact3 sp2">
  <div class="shap"><img src="--ROOT--assets/img/icons/vl-contact-layer-3.1.svg" alt=""></div>
  <div class="container">
    <div class="row">
      <div class="col-xl-6 mx-auto">
        <div class="vl-section-title3 mb-60 text-center">
          <h4 class="subtitle" data-aos="fade-up" data-aos-duration="800" data-aos-delay="300">Contact</h4>
          <h2 class="title text-anime-style-3">The Vywamus Foundation</h2>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-xl-5">
        <div class="vl-contact-icon-box mb-30" data-aos="fade-right" data-aos-duration="1200" data-aos-delay="300">
          <!-- top content -->
          <div class="vl-top-content">
            <h4 class="title"></h4>
            <p class="para">We would love to hear from you! If you have questions about our services 
              or want to learn more about The Vywamus Foundation, contact us:</p>
          </div>

          <!-- icon box start: location -->
           <div class="vl-icon-box-flex">
              <div class="vl-icon">
                <span><img src="--ROOT--assets/img/icons/vl-contact-ic-3.1.svg" alt=""></span>
              </div>
              <div class="vl-text">
                <h4 class="title">Location</h4>
                <a href="#" class="para">Maine, USA</a>
              </div>
           </div> <!-- icon box end -->

            <!-- icon box start: phone -->
            <div class="vl-icon-box-flex">
              <div class="vl-icon">
                <span><img src="--ROOT--assets/img/icons/vl-contact-ic-3.2.svg" alt=""></span>
              </div>
              <div class="vl-text">
                <h4 class="title">Phone</h4>
                <a href="#" class="para">207.797.6106</a>
              </div>
            </div> <!-- icon box end -->

          </div>
      </div>
      <div class="col-xl-7">
        <div id="contactform" class="vl-contact-from3" data-aos="fade-left" data-aos-duration="1000" data-aos-delay="300">
            <h4 class="title">Send an email:</h4>

            <form action="#">
              <div class="vl-form3">
                <div class="row">
                  <div class="col-xl-6">
                    <input type="text" placeholder="First Name">
                  </div>
                  <div class="col-xl-6">
                    <input type="text" placeholder="Last Name">
                  </div>
                  <div class="col-xl-6">
                    <input type="email" placeholder="Email Address">
                  </div>
                  <div class="col-xl-6">
                    <input type="tel" placeholder="Phone Number">
                  </div>
                  <div class="col-xl-12">
                    <textarea name="message" id="mesage" placeholder="Your Message"></textarea>
                  </div>
                  <div class="col-xl-12">
                    <div class="vl-btn3">
                      <button class="primary-btn-3" disabled>Send Now</button>
                    </div>
                  </div>
                </div>
              </div>
            </form>
        </div>
      </div>
    </div>
  </div>
</section>
<!--===== CONTACT AREA ENDS =======-->
